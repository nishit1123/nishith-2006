<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:#fff;
    width:400px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:20px;
}

.time{
    font-size:3rem;
    font-weight:bold;
    color:#222;
    margin:20px 0;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.start{background:#28a745;color:white;}
.pause{background:#ffc107;color:black;}
.reset{background:#dc3545;color:white;}
.lap{background:#007bff;color:white;}

.lap-container{
    margin-top:20px;
    text-align:left;
}

.lap-container h3{
    margin-bottom:10px;
}

#laps{
    max-height:200px;
    overflow-y:auto;
    list-style:none;
}

#laps li{
    padding:8px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="container">
    <h1>⏱ Stopwatch</h1>

    <div class="time" id="display">
        00:00:00.000
    </div>

    <div class="buttons">
        <button class="start" onclick="startStopwatch()">Start</button>
        <button class="pause" onclick="pauseStopwatch()">Pause</button>
        <button class="reset" onclick="resetStopwatch()">Reset</button>
        <button class="lap" onclick="recordLap()">Lap</button>
    </div>

    <div class="lap-container">
        <h3>Lap Times</h3>
        <ul id="laps"></ul>
    </div>
</div>

<script>
let startTime = 0;
let elapsedTime = 0;
let timerInterval;
let running = false;

function formatTime(ms){
    let milliseconds = ms % 1000;
    let seconds = Math.floor(ms / 1000) % 60;
    let minutes = Math.floor(ms / (1000 * 60)) % 60;
    let hours = Math.floor(ms / (1000 * 60 * 60));

    return (
        String(hours).padStart(2,'0') + ":" +
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0') + "." +
        String(milliseconds).padStart(3,'0')
    );
}

function updateDisplay(){
    document.getElementById("display").textContent =
        formatTime(elapsedTime);
}

function startStopwatch(){
    if(running) return;

    running = true;
    startTime = Date.now() - elapsedTime;

    timerInterval = setInterval(() => {
        elapsedTime = Date.now() - startTime;
        updateDisplay();
    }, 10);
}

function pauseStopwatch(){
    if(!running) return;

    running = false;
    clearInterval(timerInterval);
}

function resetStopwatch(){
    running = false;
    clearInterval(timerInterval);

    elapsedTime = 0;
    updateDisplay();

    document.getElementById("laps").innerHTML = "";
}

function recordLap(){
    if(elapsedTime === 0) return;

    const lapList = document.getElementById("laps");
    const lapItem = document.createElement("li");

    const lapNumber = lapList.children.length + 1;

    lapItem.textContent =
        `Lap ${lapNumber}: ${formatTime(elapsedTime)}`;

    lapList.prepend(lapItem);
}

updateDisplay();
</script>

</body>
</html>
